# Niffler default configuration
# This file is copied by `niffler init`.
# Usual location on Unix: ~/.niffler/config.yaml
# Usual location on Windows: %APPDATA%/niffler/config.yaml

# Active configuration profile. This determines which subdirectory
# under ~/.niffler/ contains the NIFFLER.md system prompt.
# Create multiple profiles (e.g., "default", "cc", "minimal") to have
# different system prompts for different workflows.
config: "default"

# Theme used for markdown rendering in the CLI.
current_theme: "default"

# Render markdown formatting in terminal output.
markdown_enabled: true

# Timeout in seconds for agent requests before they are considered failed.
agent_timeout_seconds: 300

# Maximum number of turns an agent task may run before it is stopped.
default_max_turns: 30

# Available models. Pick one by nickname with `--model=<nickname>`.
models:
  - # Short local name used when selecting this model.
    nickname: "openrouter-free"
    # OpenAI-compatible API base URL.
    base_url: "https://openrouter.ai/api/v1"
    # Provider model identifier sent to the API.
    model: "qwen/qwen3-coder:free"
    # Maximum context window supported by the model.
    context: 262144
    # Whether this model should be available for selection.
    enabled: true
    # Protocol type. Leave as `standard` for normal chat-completions style APIs.
    type: "standard"
    # Direct API key value. Put the key here if you want it stored in the config.
    api_key: "ENTER YOUR OPENROUTER API KEY HERE"
    # Alternative to `api_key`: read the key from this environment variable instead.
    api_env_var: "OPENROUTER_API_KEY"
    # Sampling temperature. Lower is more deterministic.
    temperature: 0.7
    # Nucleus sampling value.
    top_p: 0.95
    # Maximum output tokens for one response.
    max_tokens: 32768

  - # Short local name used when selecting this model.
    nickname: "openrouter-minimax-free"
    # OpenAI-compatible API base URL.
    base_url: "https://openrouter.ai/api/v1"
