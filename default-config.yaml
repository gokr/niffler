# Database connection used for persisted conversations and token usage.
database:
  # Enable or disable database usage.
  enabled: true
  # Database host name or IP.
  host: "127.0.0.1"
  # Database port.
  port: 4000
  # Database name.
  database: "niffler"
  # Database username.
  username: "root"
  # Database password.
  password: ""
  # Size of the database connection pool.
  pool_size: 10

# Master-mode settings for routing prompts to agents over NATS.
master:
  # Agent to route to when none is specified explicitly.
  default_agent: "coder"
  # Whether master mode should auto-start agents from the `agents` section below.
  auto_start_agents: true
  # Seconds between agent heartbeat checks.
  heartbeat_check_interval: 30

# Agent process metadata used for discovery and optional auto-start.
# The actual agent instructions, prompt, allowed tools, and markdown-based definition
# live in the active config's agents directory, usually ~/.niffler/<config>/agents/*.md.
# If both exist, the markdown agent definition is the authoritative runtime definition.
agents:
  - # Unique ID used to address this agent.
    id: "coder"
    # Human-friendly display name.
    name: "Code Expert"
    # Short description of the agent's purpose.
    description: "General code implementation and debugging"
    # Model nickname from the `models` section.
    model: "openrouter-free"
    # Capability labels used for discovery and routing hints.
    capabilities:
      - "coding"
      - "debugging"
      - "refactoring"
    # Tool names this agent is allowed to use.
    tool_permissions:
      - "read"
      - "edit"
      - "create"
      - "bash"
      - "list"
      - "fetch"
    # Start this agent automatically with master mode.
    auto_start: true
    # Keep this agent running between requests.
    persistent: true

  - # Unique ID used to address this agent.
    id: "researcher"
    # Human-friendly display name.
    name: "Research Assistant"
    # Short description of the agent's purpose.
    description: "Read-only research and documentation lookup"
    # Model nickname from the `models` section.
    model: "openrouter-free"
    # Capability labels used for discovery and routing hints.
    capabilities:
      - "research"
      - "documentation"
      - "analysis"
    # Tool names this agent is allowed to use.
    tool_permissions:
      - "read"
      - "list"
      - "fetch"
    # Start this agent automatically with master mode.
    auto_start: false
    # Keep this agent running between requests.
    persistent: false

  - # Unique ID used to address this agent.
    id: "local"
    # Human-friendly display name.
    name: "Local Model Agent"
    # Short description of the agent's purpose.
    description: "General local-agent profile for Ollama or LM Studio"
    # Model nickname from the `models` section.
    model: "ollama-qwen35"
    # Capability labels used for discovery and routing hints.
    capabilities:
      - "coding"
      - "chat"
      - "local"
    # Tool names this agent is allowed to use.
    tool_permissions:
      - "read"
      - "edit"
      - "create"
      - "bash"
      - "list"
    # Start this agent automatically with master mode.
    auto_start: false
    # Keep this agent running between requests.
    persistent: true

