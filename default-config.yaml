    context: 200000
    # Whether this model should be available for selection.
    enabled: true
    # Protocol type. Leave as `standard` for normal chat-completions style APIs.
    type: "standard"
    # Direct API key value. Replace this placeholder with a real provider key.
    api_key: "ENTER YOUR KEY HERE"
    # Sampling temperature. Lower is more deterministic.
    temperature: 0.6
    # Nucleus sampling value.
    top_p: 0.95
    # Maximum output tokens for one response.
    max_tokens: 32768
    # Optional cost tracking for input tokens, per million tokens.
    input_cost_per_mtoken: 0.4
    # Optional cost tracking for output tokens, per million tokens.
    output_cost_per_mtoken: 1.6
    # Optional reasoning effort hint for models that support it.
    reasoning: "medium"

