# Database connection used for persisted conversations and token usage.
database:
  # Enable or disable database usage.
  enabled: true
  # Database host name or IP.
  host: "127.0.0.1"
  # Database port.
  port: 4000
  # Database name.
  database: "niffler"
  # Database username.
  username: "root"
  # Database password.
  password: ""
  # Size of the database connection pool.
  pool_size: 10

# Master-mode settings for routing prompts to agents over NATS.
master:
  # Agent to route to when none is specified explicitly.
  default_agent: "coder"
  # Whether master mode should auto-start agent markdown definitions that have
  # `auto_start: true` in their YAML frontmatter.
  auto_start_agents: true
  # Seconds between agent heartbeat checks.
  heartbeat_check_interval: 30

# Agent metadata lives in markdown files under the active config directory,
# usually ~/.niffler/<config>/agents/*.md, using YAML frontmatter such as:
#
# ---
# model: "openrouter-free"
# allowed_tools:
#   - read
#   - edit
# capabilities:
#   - coding
# auto_start: true
# persistent: true
# ---

# Example MCP server block.
# mcp_servers:
#   calculator:
#     # Command to launch the MCP server.
#     command: "/absolute/path/to/calculator-server"
#     # Command-line arguments passed to the MCP server.
#     args: []
#     # Whether this MCP server should be enabled.
#     enabled: true
